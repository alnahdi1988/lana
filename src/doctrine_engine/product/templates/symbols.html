{% extends "base.html" %}
{% block content %}
<section class="page-header">
  <h2>Symbols</h2>
  <p class="muted">Latest symbol outcomes from the most recent run.</p>
</section>

<form class="filter-grid compact" method="get" action="/symbols">
  <label>Ticker<input type="text" name="ticker" value="{{ filters.ticker }}"></label>
  <label>Signal<input type="text" name="signal" value="{{ filters.signal }}"></label>
  <label>Setup State<input type="text" name="setup_state" value="{{ filters.setup_state }}"></label>
  <label>Micro State<input type="text" name="micro_state" value="{{ filters.micro_state }}"></label>
  <label>Alert State<input type="text" name="alert_state" value="{{ filters.alert_state }}"></label>
  <label>Telegram Status<input type="text" name="telegram_status" value="{{ filters.telegram_status }}"></label>
  <button type="submit">Filter</button>
  <a class="button secondary" href="/symbols">Reset</a>
</form>

<section class="card">
  {% include "partials/symbols_table.html" with context %}
</section>
{% endblock %}
